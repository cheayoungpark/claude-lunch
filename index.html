<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 뭐 먹지? 🍽️</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <header>
    <h1>🍽️ 오늘 뭐 먹지?</h1>
    <p>고민 끝! 점심 메뉴를 랜덤으로 추천해드립니다</p>
  </header>

  <div class="layout">
    <!-- 왼쪽: 메뉴 추천 -->
    <div class="card col-left">
      <div id="categories"></div>

      <div class="exclude-section">
        <label for="exclude-select">🚫 어제 저녁에 뭐 먹었어요?</label>
        <div class="exclude-row">
          <select id="exclude-select">
            <option value="">선택 안 함</option>
          </select>
          <button id="exclude-clear" onclick="clearExclude()" style="display:none">✕</button>
        </div>
        <div id="exclude-badge"></div>
      </div>

      <button id="recommend-btn" onclick="recommend()">오늘 뭐 먹지? 🎲</button>

      <div id="result-card"></div>
    </div>

    <!-- 오른쪽: 기록 -->
    <div class="card col-right">
      <div class="history-header">
        <h2>📋 한 달 기록</h2>
        <div class="view-tabs">
          <button class="view-tab active" onclick="switchView('list')">목록</button>
          <button class="view-tab" onclick="switchView('calendar')">달력</button>
        </div>
      </div>

      <div id="view-list">
        <div id="history-list"></div>
      </div>

      <div id="view-calendar" style="display:none">
        <div class="cal-nav">
          <button onclick="changeMonth(-1)">&#8249;</button>
          <span id="cal-title"></span>
          <button onclick="changeMonth(1)">&#8250;</button>
        </div>
        <div id="calendar-grid"></div>
        <div id="cal-detail"></div>
      </div>
    </div>
  </div>

  <footer>메뉴가 마음에 안 들면 다시 뽑아보세요 😄</footer>

  <script src="app.js?v=4"></script>
</body>
</html>
